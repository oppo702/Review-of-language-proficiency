<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head><script src="/_sdk/telemetry_sdk.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Noto Kufi Arabic', sans-serif; }
    .option-btn { transition: all 0.2s ease; }
    .option-btn:hover:not(.selected):not(.correct):not(.wrong) { transform: translateX(-4px); }
    .correct { background: #059669 !important; color: white !important; border-color: #059669 !important; }
    .wrong { background: #dc2626 !important; color: white !important; border-color: #dc2626 !important; }
    .selected { border-color: #2563eb !important; background: #eff6ff !important; }
    .progress-fill { transition: width 0.4s ease; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto bg-slate-900 text-white">
  <div id="app" class="w-full min-h-full flex flex-col items-center p-4 md:p-8"><!-- Start Screen -->
   <div id="start-screen" class="flex flex-col items-center justify-center flex-1 text-center max-w-2xl mx-auto">
    <div class="text-6xl mb-6">
     📝
    </div>
    <h1 id="main-title" class="text-3xl md:text-4xl font-bold mb-4 text-amber-400">اختبار النحو والصرف</h1>
    <p class="text-slate-300 mb-2 text-lg">35 سؤال اختيار من متعدد + 16 سؤال صواب وخطأ</p>
    <p class="text-slate-400 mb-8">اختبر معلوماتك في قواعد اللغة العربية</p><button onclick="startQuiz()" class="bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold px-10 py-4 rounded-xl text-xl transition-all hover:scale-105">ابدأ الاختبار</button>
   </div><!-- Quiz Screen -->
   <div id="quiz-screen" class="hidden w-full max-w-3xl mx-auto">
    <div class="flex items-center justify-between mb-4"><span id="q-counter" class="text-amber-400 font-bold text-lg"></span> <span id="score-display" class="text-slate-400"></span>
    </div>
    <div class="w-full bg-slate-700 rounded-full h-3 mb-6">
     <div id="progress-bar" class="progress-fill bg-amber-500 h-3 rounded-full" style="width:0%"></div>
    </div>
    <div id="question-card" class="bg-slate-800 border border-slate-700 rounded-2xl p-6 md:p-8 mb-6">
     <p id="question-text" class="text-xl md:text-2xl font-bold leading-relaxed mb-6"></p>
     <div id="options-container" class="space-y-3"></div>
    </div>
    <div id="feedback" class="hidden bg-slate-800 border border-slate-700 rounded-xl p-4 mb-4 text-center"></div><button id="next-btn" class="hidden w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-4 rounded-xl text-lg transition-all" onclick="nextQuestion()">السؤال التالي</button>
   </div><!-- Result Screen -->
   <div id="result-screen" class="hidden flex flex-col items-center justify-center flex-1 text-center max-w-2xl mx-auto">
    <div class="text-6xl mb-6" id="result-emoji"></div>
    <h2 class="text-3xl font-bold mb-4 text-amber-400">النتيجة النهائية</h2>
    <p id="result-score" class="text-5xl font-bold mb-4"></p>
    <p id="result-percent" class="text-xl text-slate-300 mb-8"></p><button onclick="restartQuiz()" class="bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold px-10 py-4 rounded-xl text-xl transition-all hover:scale-105">إعادة الاختبار</button>
   </div>
  </div>
  <script>
    const mcQuestions = [
      {q:"الكلمة التي تقبل (حالة الجر) فيما يلي:",options:["يفهم","إلى","كتاب","كان"],answer:2},
      {q:"يُعد من حروف (الجر):",options:["كم","أين","ثم","في"],answer:3},
      {q:"الجملة التي حوت (متمماً مجروراً) فيما يلي:",options:["سافرنا إلى الرياض","السماء صافية","اشتريت ثوباً جديداً","سافر زيد ليلاً"],answer:0},
      {q:"المثال الصحيح على (التركيب الإضافي) فيما يلي:",options:["الصادق محمد","فصل الربيع","أصوات تعلو","نجح الطالب"],answer:1},
      {q:"سيارة أبيك فارهة! علامة (الاسم المجرور) فيما سبق، هي:",options:["حذف حرف العلة","الكسرة الظاهرة","الكسرة المقدرة","الياء"],answer:3},
      {q:"علامة جر (الأسماء الخمسة)، هي:",options:["الفتحة","الكسرة","الياء","السكون"],answer:2},
      {q:"لا تُعد من علامات (نصب الاسم) الإعرابية:",options:["الكسرة","الياء","حذف النون","الفتحة"],answer:0},
      {q:"ظهر البدر ظهوراً ساطعاً، نوع (المفعول المطلق) فيما سبق:",options:["مؤكد للفعل","مبين لنوع الفعل","مبين لعدد مرات حدوثه","مبين لسببه"],answer:1},
      {q:"قفز الرياضي ........... متتالية، المناسب لما سبق، هو:",options:["قفزات","قفزاتاً","قفزاتٍ","قفزاتين"],answer:0},
      {q:"أقوم بواجباتي مخافة الفشل. ما دلّ على (المفعول لأجله) فيما سبق، هو:",options:["أقوم","واجباتي","مخافة","الفشل"],answer:2},
      {q:"ليس من (المفاعيل) فيما يلي:",options:["التمييز","ظرف المكان","المفعول به","ظرف الزمان"],answer:0},
      {q:"تلوت القرآن الكريم فجراً في المسجد. ما دلّ على (المفعول فيه) فيما سبق، هو:",options:["فجراً","في المسجد","القرآن","الكريم"],answer:0},
      {q:"من خصائص (المضاف إليه) أن:",options:["يسبقه معرفة","يسبقه نكرة","يسبقه فعل","يسبقه حرف"],answer:1},
      {q:"الجملة التي تدل على (الإضافة) فيما يلي، هي:",options:["رأيت أشجار الحديقة","امتلأ الفصل طلاباً","السيارة مسرعة","أقبل المعلم مبتسماً"],answer:0},
      {q:"رأيت أباك. نوع (المفعول به) فيما سبق:",options:["جملة اسمية","اسم من الأسماء الخمسة","جملة فعلية","شبه جملة"],answer:1},
      {q:"الكلمة التي اشتملت على (همزة الوصل) فيما يلي، هي:",options:["أعلام","أتأمل","إلى","الكتب"],answer:3},
      {q:"سبب (قطع الهمزة) في كلمة (إنجاز)، هو:",options:["فعل الأمر الرباعي","فعل الماضي الثلاثي","فعل الماضي الرباعي","مصدر الماضي الرباعي"],answer:3},
      {q:"الكلمة التي اشتملت على حالات رسم الهمزة الثلاث (أول ووسط وآخر الكلمة)، هي:",options:["سماؤنا","اللؤلؤ","أبناء","أقسام"],answer:2},
      {q:"سبب حذف (همزة الوصل) في قولنا: يا بن الإسلام!، هو:",options:["سبقت بحرف نداء","جاءت مضافة","جاءت مفردة","جاءت نكرة"],answer:0},
      {q:"كلمة (سماء) إذا لحقها (تنوين نصب)؛ فإن رسمها الصحيح، هو:",options:["سماءاً","سماءً","سماً","سماءاً"],answer:1},
      {q:"تَمُؤُ القطة مواءً متكرراً. الكلمة التي تصحح الخطأ فيما سبق، هي:",options:["مواءاً","تموء","تَمُوءُ","تموؤ"],answer:1},
      {q:"النص الأدبي: نص جمالي، يعيد تشكيل الواقع بصورة .......... مبتكرة. المناسب لما سبق، هو:",options:["علمية","حقيقية","خيالية","قديمة"],answer:2},
      {q:"من المعاني الإيحائية لكلمة (فرعون):",options:["العدل","الجبروت","الصبر","المساواة"],answer:1},
      {q:"قال الشاعر: إن جئت يا وطني هل فيك متسع؟. معنى (الاستفهام) فيما سبق، هو:",options:["طلب الإجابة","التوبيخ","الإنكار","التمني"],answer:3},
      {q:"عندما أشرح الصور الفنية التي يحملها النص؛ فأنا بذلك قد قرأت قراءة متأنية:",options:["للتحليل والتقويم","للفهم والتفسير","استطلاعية","حول النص"],answer:0},
      {q:"السماء ملبدة بالغيوم، وقطرات المطر تلامس وجنتيها برفق. ما سبق مثال على وصف:",options:["الشخصيات","الحوادث","المشاهد","الأماكن"],answer:2},
      {q:"يتم تركيز الواصف على (المهارات والإنجازات) إذا كان الموصوف:",options:["مجرم مطارد","يتيم ضائع","حاج راحل","لاعب كرة"],answer:3},
      {q:"القدرة على تنظيم الحالة النفسية للفرد من قبيل الذكاء:",options:["الذاتي","الانفعالي","الاجتماعي","اللغوي"],answer:1},
      {q:"من خصائص الذكاء الاجتماعي: أن يكون الشخص:",options:["متحفظاً للمعلومات","علاقاته محدودة","قيادياً","منعزلاً"],answer:2},
      {q:"إذا أردت أن تخبر زميلك بأنه لم ينجح في الاختبار بطريقة (غير مباشرة) فإنك تقول:",options:["أنت راسب","اسمك مع المخفقين","أنت لم تنجح","لكل جواد كبوة"],answer:3},
      {q:"الجنة تحت أقدام الأمهات. الاسم المجرور بالإضافة في العبارة السابقة:",options:["الجنة","تحت","أقدام","الأمهات"],answer:3},
      {q:"شرحت المسألة شرحاً. ما نوع المفعول المطلق (شرحاً) في الجملة السابقة:",options:["مبين للفعل","مؤكد للفعل","نوع للفعل","عدد للفعل"],answer:1},
      {q:"الاسم الممنوع من الصرف بسبب: علم مختوم بألف ونون زائدتين هو:",options:["عثمان","مساجد","سعاد","معاذ"],answer:0},
      {q:"سلمت على ................... (أكملي الفراغ بالكلمة الصحيحة نحوياً):",options:["أبيك","أبوك","أباك","أبا"],answer:0},
      {q:"نزلنا في صحراء واسعة. إعراب كلمة (صحراء) في الجملة السابقة:",options:["مجرور بالفتحة","مجرور بالكسرة","مضاف إليه","مفعول به"],answer:0},
      {q:"أي الجمل الآتية تشتمل على مفعول به:",options:["شرب محمد الحليب","اشتريت جراماً ذهب","نجحت نجاحين","أقمنا في المدينة ليلة"],answer:0},
    ];

    const tfQuestions = [
      {q:"الإضافة إلى معرفة تفيد التعريف.",answer:true},
      {q:"عند الإضافة فإنه يجب حذف التنوين من المضاف.",answer:true},
      {q:"أكرم أحمد سليماناً، الجملة السابقة صحيحة.",answer:true},
      {q:"المفاعيل هي متممات لمعنى الجملة الاسمية.",answer:false},
      {q:"هجم الفريق هجمتان متتاليتان. ما سبق جملة صحيحة.",answer:false},
      {q:"إذا كان أول المضارع للكلمة مفتوحاً فالهمزة همزة وصل.",answer:false},
      {q:"الحروف كلها همزتها قطع عدا (ال) التعريف.",answer:true},
      {q:"يختلف الشعر العمودي عن الشعر الحر في القافية.",answer:true},
      {q:"رسم مسرح الحدث يكون في مقدمة وصف الحادثة.",answer:true},
      {q:"يقتصر الوصف الوجداني على وصف الشخصية فقط.",answer:false},
      {q:"عندما نريد وصف شيء فإننا نلتزم بطريقة واحدة.",answer:false},
      {q:"لا تتأثر الصفات التي يطلقها الواصف على موصوفه بموقفه العاطفي منه.",answer:false},
      {q:"يشترط في التواصل التفاعل بين الطرفين.",answer:true},
      {q:"القرائن اللفظية وغير اللفظية والسياق تكشف مقصد المتحدث من الكلام.",answer:true},
      {q:"نبرة الصوت والحركات المصاحبة للحديث لا تؤثر على الموقف اللغوي.",answer:false},
    ];

    let allQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;

    function startQuiz() {
      allQuestions = [
        ...mcQuestions.map(q => ({...q, type:'mc'})),
        ...tfQuestions.map(q => ({...q, type:'tf'}))
      ];
      currentIndex = 0;
      score = 0;
      answered = false;
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.add('hidden');
      document.getElementById('quiz-screen').classList.remove('hidden');
      showQuestion();
    }

    function showQuestion() {
      answered = false;
      const q = allQuestions[currentIndex];
      const total = allQuestions.length;
      document.getElementById('q-counter').textContent = `السؤال ${currentIndex+1} من ${total}`;
      document.getElementById('score-display').textContent = `النتيجة: ${score}/${total}`;
      document.getElementById('progress-bar').style.width = `${(currentIndex/total)*100}%`;
      document.getElementById('question-text').textContent = q.q;
      document.getElementById('feedback').classList.add('hidden');
      document.getElementById('next-btn').classList.add('hidden');

      const container = document.getElementById('options-container');
      container.innerHTML = '';

      if (q.type === 'mc') {
        const labels = ['أ','ب','ج','د'];
        q.options.forEach((opt, i) => {
          const btn = document.createElement('button');
          btn.className = 'option-btn w-full text-right p-4 rounded-xl border-2 border-slate-600 bg-slate-700 hover:bg-slate-600 text-white font-medium text-lg flex items-center gap-3';
          btn.innerHTML = `<span class="w-8 h-8 rounded-full bg-slate-600 flex items-center justify-center text-sm font-bold shrink-0">${labels[i]}</span><span>${opt}</span>`;
          btn.onclick = () => selectMC(i, btn);
          container.appendChild(btn);
        });
      } else {
        ['صواب','خطأ'].forEach((label, i) => {
          const btn = document.createElement('button');
          btn.className = 'option-btn w-full text-center p-4 rounded-xl border-2 border-slate-600 bg-slate-700 hover:bg-slate-600 text-white font-bold text-xl';
          btn.innerHTML = `${i===0?'✅':'❌'} ${label}`;
          btn.onclick = () => selectTF(i===0, btn);
          container.appendChild(btn);
        });
      }
    }

    function selectMC(index, btn) {
      if (answered) return;
      answered = true;
      const q = allQuestions[currentIndex];
      const buttons = document.querySelectorAll('.option-btn');
      if (index === q.answer) {
        btn.classList.add('correct');
        score++;
        showFeedback(true);
      } else {
        btn.classList.add('wrong');
        buttons[q.answer].classList.add('correct');
        showFeedback(false);
      }
      document.getElementById('next-btn').classList.remove('hidden');
    }

    function selectTF(val, btn) {
      if (answered) return;
      answered = true;
      const q = allQuestions[currentIndex];
      const buttons = document.querySelectorAll('.option-btn');
      if (val === q.answer) {
        btn.classList.add('correct');
        score++;
        showFeedback(true);
      } else {
        btn.classList.add('wrong');
        const correctIdx = q.answer ? 0 : 1;
        buttons[correctIdx].classList.add('correct');
        showFeedback(false);
      }
      document.getElementById('next-btn').classList.remove('hidden');
    }

    function showFeedback(correct) {
      const fb = document.getElementById('feedback');
      fb.classList.remove('hidden');
      fb.className = `rounded-xl p-4 mb-4 text-center font-bold text-lg ${correct ? 'bg-emerald-900/50 text-emerald-300 border border-emerald-700' : 'bg-red-900/50 text-red-300 border border-red-700'}`;
      fb.textContent = correct ? '✓ إجابة صحيحة!' : '✗ إجابة خاطئة';
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= allQuestions.length) {
        showResults();
      } else {
        showQuestion();
      }
    }

    function showResults() {
      document.getElementById('quiz-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.remove('hidden');
      const total = allQuestions.length;
      const percent = Math.round((score/total)*100);
      document.getElementById('result-score').textContent = `${score} / ${total}`;
      document.getElementById('result-percent').textContent = `${percent}%`;
      document.getElementById('result-emoji').textContent = percent >= 80 ? '🏆' : percent >= 60 ? '👏' : '💪';
    }

    function restartQuiz() {
      document.getElementById('result-screen').classList.add('hidden');
      startQuiz();
    }

    // Element SDK
    const defaultConfig = {
      quiz_title: 'اختبار النحو والصرف',
      background_color: '#0f172a',
      surface_color: '#1e293b',
      text_color: '#ffffff',
      primary_action_color: '#f59e0b',
      secondary_action_color: '#94a3b8',
      font_family: 'Noto Kufi Arabic',
      font_size: 16
    };

    function applyConfig(config) {
      const title = config.quiz_title || defaultConfig.quiz_title;
      document.getElementById('main-title').textContent = title;
      document.body.style.backgroundColor = config.background_color || defaultConfig.background_color;
      const font = config.font_family || defaultConfig.font_family;
      document.body.style.fontFamily = `${font}, sans-serif`;
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => { applyConfig(config); },
      mapToCapabilities: (config) => ({
        recolorables: [
          {get:()=>config.background_color||defaultConfig.background_color,set:(v)=>{config.background_color=v;window.elementSdk.setConfig({background_color:v})}},
          {get:()=>config.surface_color||defaultConfig.surface_color,set:(v)=>{config.surface_color=v;window.elementSdk.setConfig({surface_color:v})}},
          {get:()=>config.text_color||defaultConfig.text_color,set:(v)=>{config.text_color=v;window.elementSdk.setConfig({text_color:v})}},
          {get:()=>config.primary_action_color||defaultConfig.primary_action_color,set:(v)=>{config.primary_action_color=v;window.elementSdk.setConfig({primary_action_color:v})}},
          {get:()=>config.secondary_action_color||defaultConfig.secondary_action_color,set:(v)=>{config.secondary_action_color=v;window.elementSdk.setConfig({secondary_action_color:v})}},
        ],
        borderables: [],
        fontEditable: {get:()=>config.font_family||defaultConfig.font_family,set:(v)=>{config.font_family=v;window.elementSdk.setConfig({font_family:v})}},
        fontSizeable: {get:()=>config.font_size||defaultConfig.font_size,set:(v)=>{config.font_size=v;window.elementSdk.setConfig({font_size:v})}}
      }),
      mapToEditPanelValues: (config) => new Map([
        ["quiz_title", config.quiz_title || defaultConfig.quiz_title]
      ])
    });

    lucide.createIcons();
  </script>
